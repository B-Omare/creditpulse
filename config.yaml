# CreditPulse pipeline configuration
data:
  raw_dir: data/raw
  processed_dir: data/processed
  simulated_dir: data/simulated

models:
  output_dir: models
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
  bayesian:
    draws: 500
    tune: 200
    chains: 2
  survival:
    n_estimators: 100

simulation:
  n_borrowers: 1000
  n_months: 12
  seed: 42

api:
  host: "0.0.0.0"
  port: 8000

ifrs9:
  lgd: 0.45
  stage2_pd_threshold: 0.15
  stage3_pd_threshold: 0.40
